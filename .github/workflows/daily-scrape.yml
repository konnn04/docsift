name: Daily scrape & upload

# Scheduled trigger disabled: scraping now runs on Railway instead. Re-enable
# the `schedule` block below to bring the GitHub Actions cron back.
on:
  # schedule:
  #   - cron: "0 3 * * *" # 03:00 UTC daily
  workflow_dispatch:
    inputs:
      limit:
        description: "Cap the number of articles scraped/synced (leave empty for a full run)"
        required: false
        type: string

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t docsift-scraper .

      - name: Run daily scrape
        env:
          LIMIT: ${{ github.event.inputs.limit }}
        run: |
          args=()
          if [ -n "$LIMIT" ]; then
            args+=(--limit "$LIMIT")
          fi
          docker run --rm \
            -e GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            -e GEMINI_MODEL="${{ vars.GEMINI_MODEL }}" \
            -e GEMINI_STORE_NAME="${{ vars.GEMINI_STORE_NAME }}" \
            -v "${{ github.workspace }}/data:/app/data" \
            docsift-scraper "${args[@]}" | tee run.log

      - name: Job summary
        if: always()
        run: |
          echo '### Daily scrape log' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -n 20 run.log >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: daily-scrape-log-${{ github.run_id }}
          path: run.log
