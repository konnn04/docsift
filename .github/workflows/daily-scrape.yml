name: Daily scrape & upload

on:
  schedule:
    - cron: "0 3 * * *" # 03:00 UTC daily
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t docsift-scraper .

      - name: Run daily scrape
        run: |
          docker run --rm \
            -e GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            -e GEMINI_MODEL="${{ vars.GEMINI_MODEL }}" \
            -e GEMINI_STORE_NAME="${{ vars.GEMINI_STORE_NAME }}" \
            -v "${{ github.workspace }}/articles:/app/articles" \
            -v "${{ github.workspace }}/data:/app/data" \
            docsift-scraper | tee run.log

      - name: Job summary
        if: always()
        run: |
          echo '### Daily scrape log' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -n 20 run.log >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: daily-scrape-log-${{ github.run_id }}
          path: run.log

      - name: Commit updated articles/manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add articles data
          git diff --cached --quiet || git commit -m "chore: daily scrape sync ($(date -u +%Y-%m-%d))"
          git push
